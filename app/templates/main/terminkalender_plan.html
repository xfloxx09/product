{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 560px;">
    <h2 class="mb-3" style="color:#e20074;">Geplantes Coaching</h2>
    <p class="text-muted">Termin frei wählbar</p>

    <form method="post" class="card card-body bg-dark border-secondary text-light">
        <input type="hidden" name="project_id" value="{{ project_id or '' }}">
        {% if filter_projects and filter_projects|length > 1 %}
        <div class="form-group">
            <label for="project_filter">Projekt-Filter</label>
            <select id="project_filter" class="form-control">
                <option value="all" {% if not project_id %}selected{% endif %}>Alle sichtbaren Projekte</option>
                {% for p in filter_projects %}
                <option value="{{ p.id }}" {% if project_id and project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
            <small class="form-text text-muted">Filtert nur die Mitarbeiterliste für diese Planung.</small>
        </div>
        {% endif %}

        <div class="form-group">
            <label for="plan_date">Datum</label>
            <input type="date" name="plan_date" id="plan_date" class="form-control" value="{{ plan_date.isoformat() }}" min="{{ today.isoformat() }}" required>
        </div>

        <div class="form-group">
            <label for="team_member_id">Teammitglied</label>
            <select name="team_member_id" id="team_member_id" class="form-control" required>
                <option value="">— Bitte wählen —</option>
                {% for m in members %}
                <option value="{{ m.id }}" {% if selected_member_id and selected_member_id == m.id %}selected{% endif %}>{{ m.name }} ({{ m.team.name if m.team else '' }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="notes">Notizen</label>
            <textarea name="notes" id="notes" class="form-control" rows="2" placeholder="Optional"></textarea>
        </div>
        <div class="form-check mb-2">
            <input type="checkbox" class="form-check-input" name="has_verabredung" id="has_verabredung" value="1">
            <label class="form-check-label" for="has_verabredung">Vereinbarung mit Text</label>
        </div>
        <div class="form-group" id="verab_wrap" style="display:none;">
            <label for="verabredung_text">Text der Vereinbarung</label>
            <textarea name="verabredung_text" id="verabredung_text" class="form-control" rows="2"></textarea>
        </div>
        <button type="submit" class="btn telekom-button btn-block">Speichern</button>
        <a href="{{ url_for('main.terminkalender', year=plan_date.year, month=plan_date.month) }}" class="btn btn-outline-secondary btn-block mt-2">Abbrechen</a>
    </form>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var cb = document.getElementById('has_verabredung');
    var w = document.getElementById('verab_wrap');
    var pf = document.getElementById('project_filter');
    if (cb && w) {
        function t() { w.style.display = cb.checked ? 'block' : 'none'; }
        cb.addEventListener('change', t);
        t();
    }
    if (pf) {
        pf.addEventListener('change', function() {
            var url = new URL(window.location.href);
            url.searchParams.set('day', '{{ plan_date.isoformat() }}');
            if (pf.value === 'all') {
                url.searchParams.delete('project');
            } else {
                url.searchParams.set('project', pf.value);
            }
            window.location.href = url.toString();
        });
    }
});
</script>
{% endblock %}
